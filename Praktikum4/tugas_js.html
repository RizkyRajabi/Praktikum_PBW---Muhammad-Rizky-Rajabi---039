<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Program Cek Huruf Mutu</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 30px;
      }
      .container {
        max-width: 400px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 15px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }
      button:hover {
        background-color: #0056b3;
      }
      #hasil {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
      }
      .error {
        color: red;
        font-weight: bold;
      }
      .success {
        background-color: #e9ecef;
        border-left: 4px solid #007bff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Cek Nilai Mata Kuliah</h2>

      <div class="form-group">
        <label for="nim">NIM (Nomor Induk Mahasiswa):</label>
        <input type="text" id="nim" placeholder="Masukkan NIM Anda" />
      </div>

      <div class="form-group">
        <label for="nilai">Nilai Mata Kuliah:</label>
        <input
          type="number"
          id="nilai"
          placeholder="Masukkan Nilai (0 - 100)"
        />
      </div>

      <button onclick="cekNilai()">Cek Nilai</button>

      <div id="hasil"></div>
    </div>

    <script>
      function cekNilai() {
        // Mengambil data dari form
        const nim = document.getElementById("nim").value;
        const nilaiInput = document.getElementById("nilai").value;
        const hasilDiv = document.getElementById("hasil");

        // Validasi dasar jika form kosong
        if (nim === "" || nilaiInput === "") {
          hasilDiv.innerHTML =
            '<span class="error">Harap isi NIM dan Nilai terlebih dahulu!</span>';
          hasilDiv.className = "";
          return;
        }

        // Mengubah input nilai menjadi angka (float untuk jaga-jaga jika ada desimal)
        const nilai = parseFloat(nilaiInput);

        // c. Kondisi if-else untuk menentukan huruf mutu
        if (nilai < 0 || nilai > 100) {
          hasilDiv.innerHTML = '<span class="error">Nilai tidak valid!</span>';
          hasilDiv.className = "";
        } else {
          let hurufMutu = "";

          if (nilai >= 80 && nilai <= 100) {
            hurufMutu = "A";
          } else if (nilai >= 70 && nilai < 80) {
            hurufMutu = "B";
          } else if (nilai >= 60 && nilai < 70) {
            hurufMutu = "C";
          } else if (nilai >= 50 && nilai < 60) {
            hurufMutu = "D";
          } else if (nilai >= 0 && nilai < 50) {
            hurufMutu = "E";
          }

          // d. Menampilkan huruf mutu di bawah form
          hasilDiv.innerHTML = `NIM: <strong>${nim}</strong> <br> Mendapatkan Huruf Mutu: <strong>${hurufMutu}</strong>`;
          hasilDiv.className = "success";
        }
      }
    </script>
  </body>
</html>
